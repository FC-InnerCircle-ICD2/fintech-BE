name: "🚀CI & CD"
on:
  push:
    branches:
      - feat/176.3

concurrency:
  group: ${{ github.workflow }}

jobs:
  ci:
    name: "🔨"
    uses: ./.github/workflows/wc-ci.yaml
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    secrets: inherit

  cd:
    needs:
      - ci
    name: "🔄"
    uses: ./.github/workflows/wc-cd.yaml
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    secrets: inherit
